name: Build EonMem Python capsule

on:
  push:
    branches: [main]
    paths:
      - '09_SYSTEM20/source/eonmem_python.py'
      - '09_SYSTEM20/runtime/eon.loader.py'
      - '.github/workflows/build-eonmem.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build deterministic runtime capsule v2
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import hashlib
          import json

          source_path = Path('09_SYSTEM20/source/eonmem_python.py')
          capsule_path = Path('09_SYSTEM20/runtime/eon.runtime.json')
          chunk_size = 512

          source = source_path.read_bytes()
          encoded = base64.b64encode(gzip.compress(source, mtime=0)).decode('ascii')
          chunks = [encoded[index:index + chunk_size] for index in range(0, len(encoded), chunk_size)]
          capsule = {
              'format': 'EonRuntimeCapsule',
              'version': 2,
              'engine': 'python3',
              'codec': 'gzip+base64-chunks',
              'entrypoint': source_path.name,
              'source_sha256': hashlib.sha256(source).hexdigest(),
              'payload_chunk_size': chunk_size,
              'payload_chunks': chunks,
          }
          capsule_path.write_text(
              json.dumps(capsule, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
              newline='\n',
          )
          PY

      - name: Smoke test capsule route
        shell: bash
        run: |
          set -euo pipefail
          python3 09_SYSTEM20/runtime/eon.loader.py --version | grep -q 'eonmem 0.2.0'
          python3 09_SYSTEM20/runtime/eon.loader.py --show > /tmp/eonmem-show.txt
          grep -q 'СИСТЕМА 20' /tmp/eonmem-show.txt
          grep -q 'Режим просмотра: состояние не изменено.' /tmp/eonmem-show.txt

      - name: Enforce transport budgets
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json

          checks = {
              Path('09_SYSTEM20/runtime/eon.loader.py'): (8 * 1024, 140, 700),
              Path('09_SYSTEM20/runtime/eon.runtime.json'): (16 * 1024, 80, 700),
              Path('09_SYSTEM20/runtime/eon.state.json'): (8 * 1024, 60, 1200),
          }
          for path, (max_bytes, max_lines, max_line_chars) in checks.items():
              data = path.read_text(encoding='utf-8')
              lines = data.splitlines()
              assert len(data.encode('utf-8')) <= max_bytes, f'{path}: too large'
              assert len(lines) <= max_lines, f'{path}: too many lines'
              assert max((len(line) for line in lines), default=0) <= max_line_chars, f'{path}: line too long'

          state = json.loads(Path('09_SYSTEM20/runtime/eon.state.json').read_text(encoding='utf-8'))
          assert state.get('format_version') == 2
          assert 'history' not in state
          assert state.get('history_index', {}).get('format') == 'step-files-v1'
          PY

      - name: Write immutable runtime checksums
        shell: bash
        run: |
          set -euo pipefail
          cd 09_SYSTEM20/runtime
          sha256sum eon.loader.py eon.runtime.json > SHA256SUMS

      - name: Refresh repository hashes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import re

          root = Path('.')
          items = []
          for path in root.rglob('*'):
              if not path.is_file():
                  continue
              rel = path.relative_to(root).as_posix()
              if rel.startswith('.git/') or rel == 'FILE_HASHES.sha256':
                  continue
              if rel == '09_SYSTEM20/runtime/eon.state.json':
                  continue
              if rel.endswith('/Launch_EON.zip') or rel == 'Launch_EON.zip':
                  continue
              if rel.endswith('/backpack.zip') or rel == 'backpack.zip':
                  continue
              if re.search(r'(^|/)Patch_Eon[0-9]+\.zip$', rel):
                  continue
              items.append((rel, path))

          items.sort(key=lambda item: item[0])
          with open('FILE_HASHES.sha256', 'w', encoding='utf-8', newline='\n') as output:
              for rel, path in items:
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  output.write(f'{digest}  {rel}\n')
          PY

      - name: Commit generated capsule
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 09_SYSTEM20/runtime/eon.runtime.json \
                  09_SYSTEM20/runtime/SHA256SUMS \
                  FILE_HASHES.sha256
          if git diff --cached --quiet; then
            echo 'Python capsule is already current.'
            exit 0
          fi
          git commit -m 'Build EonMem Python capsule v2 [skip ci]'
          git push
